name: Deploy Next.js to Azure App Service

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: rakshak
        run: npm ci

      - name: Build
        working-directory: rakshak
        run: npx next build --no-lint

      - name: Zip artifact
        run: |
          cd rakshak
          zip -r ../release.zip . --exclude "*.git*" --exclude "node_modules/*"

      - name: Deploy
        uses: azure/webapps-deploy@v2
        with:
          app-name: sahaay
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: release.zip
